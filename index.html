<!DOCTYPE html>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

.hero p{

.action-buttons{

}

.action-buttons .btn{

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

                    </a>
